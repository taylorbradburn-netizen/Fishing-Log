<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Entry — TB's Fishing Log</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="site-header">
    <div class="d-flex align-items-center justify-content-between">
      <div>
        <h1 class="mb-0">New Entry</h1>
        <small>TB's Fishing Log</small>
      </div>
      <a href="/" class="btn btn-refresh btn-sm">Cancel</a>
    </div>
  </header>

  <div class="container-fluid px-3 py-3">
    <form method="POST" action="/save" enctype="multipart/form-data">

      <!-- Date & River -->
      <div class="form-card">
        <div class="form-card-header">Trip Details</div>
        <div class="form-card-body">

          <div class="form-group">
            <label class="form-label-custom">Date</label>
            <input type="date" name="date" class="form-input" value="{{ today }}" required>
          </div>

          <div class="form-group">
            <label class="form-label-custom">River / Location</label>
            <select name="river_id" id="river-select" class="form-input" onchange="onRiverChange(this)">
              <option value="">— Select a river —</option>
              {% for r in rivers %}
              <option value="{{ r.id }}" data-name="{{ r.name }}">{{ r.name }}</option>
              {% endfor %}
              <option value="other">Other</option>
            </select>
            <input type="text" name="river_name" id="river-name-input" class="form-input mt-2"
                   placeholder="River name" style="display:none">
            <input type="hidden" name="river_name" id="river-name-hidden" value="">
          </div>

        </div>
      </div>

      <!-- Conditions (auto-filled) -->
      <div class="form-card">
        <div class="form-card-header">
          Conditions
          <span class="fetch-spinner" id="fetch-spinner" style="display:none">Loading...</span>
        </div>
        <div class="form-card-body">

          <div class="conditions-grid">
            <div class="form-group">
              <label class="form-label-custom">Flow (CFS)</label>
              <input type="number" name="cfs" id="cfs" class="form-input" step="0.1" placeholder="—">
            </div>
            <div class="form-group">
              <label class="form-label-custom">Pressure (inHg)</label>
              <input type="number" name="pressure_inhg" id="pressure_inhg" class="form-input" step="0.01" placeholder="—">
            </div>
            <div class="form-group">
              <label class="form-label-custom">Pressure Trend</label>
              <select name="pressure_trend" id="pressure_trend" class="form-input">
                <option value="">—</option>
                <option value="Rising">↑ Rising</option>
                <option value="Steady">→ Steady</option>
                <option value="Falling">↓ Falling</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label-custom">Water Temp (°F)</label>
              <input type="number" name="water_temp_f" id="water_temp_f" class="form-input" step="0.1" placeholder="—">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label-custom">Water Clarity</label>
            <select name="clarity" class="form-input">
              <option value="">— Select clarity —</option>
              <option value="Crystal Clear">Crystal Clear</option>
              <option value="Clear">Clear</option>
              <option value="Slightly Turbid">Slightly Turbid</option>
              <option value="Turbid">Turbid</option>
              <option value="Muddy">Muddy</option>
            </select>
          </div>

        </div>
      </div>

      <!-- Methods -->
      <div class="form-card">
        <div class="form-card-header">Method</div>
        <div class="form-card-body">
          <div class="method-grid">
            {% for method in ['Dry Fly', 'Nymphing', 'Euro Nymphing', 'Streamer', 'Hopper-Dropper', 'Wet Fly', 'Sight Fishing', 'Terrestrial'] %}
            <label class="method-option">
              <input type="checkbox" name="methods" value="{{ method }}">
              <span>{{ method }}</span>
            </label>
            {% endfor %}
          </div>
        </div>
      </div>

      <!-- Flies -->
      <div class="form-card">
        <div class="form-card-header">Flies Used</div>
        <div class="form-card-body">
          <div class="form-group">
            <label class="form-label-custom">Flies (comma separated)</label>
            <input type="text" name="flies" class="form-input"
                   placeholder="e.g. PMD #16, BWO #18, Hopper #8">
          </div>
          <div class="form-group">
            <label class="form-label-custom">Fly Photos (optional)</label>
            <input type="file" name="fly_photos" class="form-input" accept="image/*" multiple>
          </div>
        </div>
      </div>

      <!-- Fish -->
      <div class="form-card">
        <div class="form-card-header">Fish Caught</div>
        <div class="form-card-body">
          <div class="conditions-grid">
            <div class="form-group">
              <label class="form-label-custom">Count</label>
              <input type="number" name="fish_count" class="form-input" min="0" placeholder="0">
            </div>
            <div class="form-group">
              <label class="form-label-custom">Species</label>
              <input type="text" name="species" class="form-input" placeholder="e.g. Brown Trout">
            </div>
          </div>
        </div>
      </div>

      <!-- Notes -->
      <div class="form-card">
        <div class="form-card-header">Notes</div>
        <div class="form-card-body">
          <textarea name="notes" class="form-input form-textarea"
                    placeholder="Observations, hatches, water conditions, spots..."></textarea>
        </div>
      </div>

      <button type="submit" class="btn-save">Save Trip</button>

    </form>
  </div>

  <script>
    function onRiverChange(select) {
      const id = select.value;
      const nameInput = document.getElementById('river-name-input');
      const nameHidden = document.getElementById('river-name-hidden');
      const selectedOption = select.options[select.selectedIndex];

      if (id === 'other') {
        nameInput.style.display = '';
        nameInput.required = true;
        nameHidden.name = '';
        nameInput.name = 'river_name';
        clearConditions();
      } else if (id) {
        nameInput.style.display = 'none';
        nameInput.required = false;
        nameInput.name = '';
        nameHidden.name = 'river_name';
        nameHidden.value = selectedOption.dataset.name;
        fetchConditions(id);
      } else {
        nameInput.style.display = 'none';
        nameHidden.value = '';
        clearConditions();
      }
    }

    function clearConditions() {
      ['cfs', 'pressure_inhg', 'water_temp_f'].forEach(id => {
        document.getElementById(id).value = '';
      });
      document.getElementById('pressure_trend').value = '';
    }

    async function fetchConditions(siteId) {
      const spinner = document.getElementById('fetch-spinner');
      spinner.style.display = '';
      clearConditions();
      try {
        const resp = await fetch(`/api/river-conditions/${siteId}`);
        const data = await resp.json();
        if (data.cfs != null) document.getElementById('cfs').value = data.cfs;
        if (data.pressure_inhg != null) document.getElementById('pressure_inhg').value = data.pressure_inhg;
        if (data.water_temp_f != null) document.getElementById('water_temp_f').value = data.water_temp_f;
        if (data.pressure_trend) {
          document.getElementById('pressure_trend').value = data.pressure_trend;
        }
      } catch (e) {
        console.error('Failed to fetch conditions', e);
      } finally {
        spinner.style.display = 'none';
      }
    }
  </script>
</body>
</html>
